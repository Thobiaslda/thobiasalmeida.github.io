name: Update WC2026 team data

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch:        # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh team form data
        env:
          API_FOOTBALL_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/update-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "wc2026-data-bot"
          git config user.email "actions@github.com"
          git add teams-data.js
          git diff --cached --quiet || git commit -m "Auto-update WC2026 team form data"
          git push
